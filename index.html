<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowboard — Project Management Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <h1 class="brand-title">Flowboard <span class="brand-sub">/ Client Launch Sprint</span></h1>
    </div>
  </div>

  <div class="header-center">
    <div class="search-field">
      <svg class="icon-search" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5.25" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search tasks by title…" aria-label="Search tasks">
    </div>

    <label class="filter-field" for="filterSelect">
      <svg class="icon-filter" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M2 3H14M4.5 8H11.5M7 13H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <select id="filterSelect" class="filter-select" aria-label="Filter tasks">
        <option value="all">All tasks</option>
        <optgroup label="Priority">
          <option value="priority:high">High priority</option>
          <option value="priority:medium">Medium priority</option>
          <option value="priority:low">Low priority</option>
        </optgroup>
        <optgroup label="Assignee">
          <option value="assignee:John Park">John Park</option>
          <option value="assignee:Priya Nair">Priya Nair</option>
          <option value="assignee:Mike Chen">Mike Chen</option>
          <option value="assignee:Sarah Lee">Sarah Lee</option>
          <option value="assignee:">Unassigned</option>
        </optgroup>
        <optgroup label="Due status">
          <option value="due:overdue">Overdue</option>
          <option value="due:today">Due today</option>
          <option value="due:upcoming">Upcoming</option>
        </optgroup>
      </select>
    </label>
  </div>

  <div class="header-right">
    <button class="btn btn-primary" id="addTaskBtn" type="button">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 2.5V13.5M2.5 8H13.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
      Add task
    </button>
    <button class="btn-icon-only" type="button" aria-label="Open menu">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="3" r="1.3" fill="currentColor"/>
        <circle cx="8" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="8" cy="13" r="1.3" fill="currentColor"/>
      </svg>
    </button>
  </div>
</header>

<div class="app-shell">

  <!-- ============================== -->
  <!-- MAIN BOARD -->
  <!-- ============================== -->
  <main class="board-main">

    <section class="board" id="board" aria-label="Task board">

      <!-- COLUMN: Backlog -->
      <section class="column" data-column="backlog">
        <header class="column-header">
          <div class="column-heading">
            <span class="column-dot dot-backlog" aria-hidden="true"></span>
            <h2 class="column-title">Backlog</h2>
            <span class="task-count">2</span>
          </div>
          <button class="column-menu-btn" type="button" aria-label="Column options">⋯</button>
        </header>

        <!-- Tasks are rendered dynamically by renderTasks() in script.js -->
        <div class="task-list" data-tasklist="backlog" aria-label="Backlog tasks"></div>
      </section>

      <!-- COLUMN: To Do -->
      <section class="column" data-column="todo">
        <header class="column-header">
          <div class="column-heading">
            <span class="column-dot dot-todo" aria-hidden="true"></span>
            <h2 class="column-title">To Do</h2>
            <span class="task-count">1</span>
          </div>
          <button class="column-menu-btn" type="button" aria-label="Column options">⋯</button>
        </header>

        <!-- Tasks are rendered dynamically by renderTasks() in script.js -->
        <div class="task-list" data-tasklist="todo" aria-label="To Do tasks"></div>
      </section>

      <!-- COLUMN: In Progress -->
      <section class="column" data-column="in-progress">
        <header class="column-header">
          <div class="column-heading">
            <span class="column-dot dot-progress" aria-hidden="true"></span>
            <h2 class="column-title">In Progress</h2>
            <span class="task-count">1</span>
          </div>
          <button class="column-menu-btn" type="button" aria-label="Column options">⋯</button>
        </header>

        <!-- Tasks are rendered dynamically by renderTasks() in script.js -->
        <div class="task-list" data-tasklist="in-progress" aria-label="In Progress tasks"></div>
      </section>

      <!-- COLUMN: Review -->
      <section class="column" data-column="review">
        <header class="column-header">
          <div class="column-heading">
            <span class="column-dot dot-review" aria-hidden="true"></span>
            <h2 class="column-title">Review</h2>
            <span class="task-count">1</span>
          </div>
          <button class="column-menu-btn" type="button" aria-label="Column options">⋯</button>
        </header>

        <!-- Tasks are rendered dynamically by renderTasks() in script.js -->
        <div class="task-list" data-tasklist="review" aria-label="Review tasks"></div>
      </section>

      <!-- COLUMN: Done -->
      <section class="column" data-column="done">
        <header class="column-header">
          <div class="column-heading">
            <span class="column-dot dot-done" aria-hidden="true"></span>
            <h2 class="column-title">Done</h2>
            <span class="task-count">1</span>
          </div>
          <button class="column-menu-btn" type="button" aria-label="Column options">⋯</button>
        </header>

        <!-- Tasks are rendered dynamically by renderTasks() in script.js -->
        <div class="task-list" data-tasklist="done" aria-label="Done tasks"></div>
      </section>

      <!-- Add column control -->
      <button class="add-column-btn" type="button" id="addColumnBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2.5V13.5M2.5 8H13.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
        Add column
      </button>

    </section>
  </main>

  <!-- ============================== -->
  <!-- RIGHT SIDEBAR — ACTIVITY LOG -->
  <!-- ============================== -->
  <aside class="activity-panel" aria-label="Activity log">
    <header class="activity-header">
      <h2 class="activity-title">Activity log</h2>
      <span class="activity-live-dot" aria-hidden="true"></span>
    </header>

    <div class="team-strip">
      <span class="team-strip-label">Team</span>
      <div class="team-avatars">
        <span class="avatar avatar-sm" style="--avatar-color:#4361EE" title="John Park">JP</span>
        <span class="avatar avatar-sm" style="--avatar-color:#7C5CFC" title="Priya Nair">PN</span>
        <span class="avatar avatar-sm" style="--avatar-color:#0BA5A0" title="Mike Chen">MC</span>
        <span class="avatar avatar-sm" style="--avatar-color:#E0673C" title="Sarah Lee">SL</span>
      </div>
    </div>

    <!-- Activity entries are rendered dynamically by renderActivity() in script.js -->
    <ul class="activity-list" id="activityList" aria-live="polite" aria-atomic="false"></ul>
  </aside>

</div>

<!-- ============================== -->
<!-- ADD / EDIT TASK MODAL -->
<!-- ============================== -->
<div class="modal-overlay" id="taskModalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
    <header class="modal-header">
      <h2 class="modal-title" id="taskModalTitle">Add task</h2>
      <button class="modal-close-btn" type="button" id="taskModalCloseBtn" aria-label="Close dialog">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3.5 3.5L12.5 12.5M12.5 3.5L3.5 12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <form class="modal-form" id="taskForm" novalidate>
      <!-- Hidden field holds the task id while editing; empty when adding -->
      <input type="hidden" id="taskId" value="">

      <div class="form-group">
        <label class="form-label" for="taskTitle">Task title <span class="required-mark">*</span></label>
        <input class="form-input" type="text" id="taskTitle" placeholder="e.g. Fix Navbar Bug" autocomplete="off" aria-describedby="taskTitleError" aria-required="true">
        <span class="form-error" id="taskTitleError" role="alert"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="taskDescription">Description</label>
        <textarea class="form-textarea" id="taskDescription" rows="3" placeholder="Short description of the task"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="taskAssignee">Assignee</label>
          <select class="form-select" id="taskAssignee">
            <option value="">Unassigned</option>
            <option value="John Park">John Park</option>
            <option value="Priya Nair">Priya Nair</option>
            <option value="Mike Chen">Mike Chen</option>
            <option value="Sarah Lee">Sarah Lee</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="taskPriority">Priority</label>
          <select class="form-select" id="taskPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="taskDueDate">Due date</label>
        <input class="form-input" type="date" id="taskDueDate" aria-describedby="taskDueDateError">
        <span class="form-error" id="taskDueDateError" role="alert"></span>
      </div>

      <footer class="modal-footer">
        <button type="button" class="btn btn-secondary" id="taskModalCancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="taskModalSubmitBtn">Add task</button>
      </footer>
    </form>
  </div>
</div>

<!-- ============================== -->
<!-- DELETE CONFIRMATION MODAL -->
<!-- ============================== -->
<div class="modal-overlay" id="deleteModalOverlay" hidden>
  <div class="modal modal-sm" role="alertdialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <header class="modal-header">
      <h2 class="modal-title" id="deleteModalTitle">Delete task?</h2>
    </header>
    <div class="modal-body">
      <p class="modal-text">This will permanently remove <strong id="deleteTaskName">this task</strong> from the board. This action cannot be undone.</p>
    </div>
    <footer class="modal-footer">
      <button type="button" class="btn btn-secondary" id="deleteModalCancelBtn">Cancel</button>
      <button type="button" class="btn btn-danger" id="deleteModalConfirmBtn">Delete task</button>
    </footer>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
